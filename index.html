<!DOCTYPE html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <link rel="stylesheet" href="node_modules/@picocss/pico/css/pico.min.css">
  <link rel="stylesheet" href="src/style/style.css">
  <script src="src/js/renderer.js"></script>
</head>

<main class="container">
  <!--TODO Want better fonts-->
  <h1>Greg's Ops Tool</h1>

  <div id="tools-menus">
    <div id="lxd-tools">
      <h2>LXD Tools</h2>
      <button onclick="window.electronApi.openInIde('lxd-tools')">Open lxd-tools in IDE</button>
      <button onclick="window.electronApi.open('lxd-tools')">Open lxd-tools directory</button>
      <button onclick="window.electronApi.runCommand({ command: 'npm', args: ['test'], key: 'lxd-tools' });">Test lxd-tools</button>
      <button onclick="window.electronApi.runCommand({ command: 'npm', args: ['run', 'build:dev'], key: 'lxd-tools' });">Build lxd-tools locally</button>
      <button onclick="window.electronApi.runCommand({ command: 'git', args: ['status'], key: 'lxd-tools' });">lxd-tools git status</button>
      <button onclick="window.electronApi.openLink('https://github.com/Unity-Environmental-University/lxd-tools')">Open lxd-tools in GitHub</button>
    </div>

    <div id="misc">
      <h2>Repo Control</h2>
      <!--TODO Want this to evolve to let the user do text input, browse input or recent dropdown -->
      <input type="text" id="path" placeholder="Repo path" />
      <button onclick="window.electronApi.openInIde(document.getElementById('path').value)">Open Repo in IDE</button>
      <button onclick="window.electronApi.runCommand({
        command: 'git',
        args: ['status'],
        key: document.getElementById('path').value
      })">
        Repo git status
      </button>
      <button onclick="window.electronApi.open('dev-folder')">Dev Folder</button>
    </div>
    <div id="productivity-menu">
      <h2>Task Tracking</h2>
      <button onclick="window.electronApi.openLink('https://trello.com/b/XTLJLLI9/agile-learning-tech-board?filter=member:greg_siekman')">Trello</button>
      <button onclick="window.electronApi.open('todoist')">Todoist</button>
      <button onclick="window.electronApi.runScript('daily-sync')">Daily Sync</button>
      <button onclick="window.electronApi.runScript('log-faq')">Log FAQ</button>
    </div>
    <div id="course-menu">
      <h2>Course Navigation</h2>
      <button onclick="window.electronApi.openLink('https://unity.instructure.com/courses/8061526')">Open TEST101</button>
      <button onclick="window.electronApi.openLink('https://unity.instructure.com/courses/8045765')">Open TEST505</button>
      <button onclick="window.electronApi.runScript('reset-test')">Reset Test Course</button>
    </div>
  </div>

  <div id="output-modal" style="display:none; position:fixed; top:10%; left:10%; width:80%; height:80%; background:black; color:white; overflow:auto;">
    <pre id="output-box"></pre>
    <button id="close-button">Close</button>
  </div>
